name: mpv_audio_kit
description: "Flutter audio player built on top of libmpv. Supports audio filters, pitch control, equalizer, and all mpv audio features. Targets macOS, Windows, Linux, iOS and Android."
version: 0.0.8
homepage: https://github.com/ales-drnz/mpv_audio_kit
repository: https://github.com/ales-drnz/mpv_audio_kit
issue_tracker: https://github.com/ales-drnz/mpv_audio_kit/issues

topics:
  - cross-platform
  - audio-player
  - libmpv
  - ffmpeg
  - dsp

platforms:
  android:
  ios:
  linux:
  macos:
  windows:

environment:
  sdk: ^3.4.0
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2
  ffi: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.alesdrnz.mpv_audio_kit
        pluginClass: MpvAudioKitPlugin
        ffiPlugin: true
      ios:
        pluginClass: MpvAudioKitPlugin
        ffiPlugin: true
      linux:
        ffiPlugin: true
      macos:
        pluginClass: MpvAudioKitPlugin
        ffiPlugin: true
      windows:
        ffiPlugin: true
